[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vinaya-workspace"
version = "0.1.0"
description = "Vinaya judgment purification engine with Next.js web app and FastAPI backend"
requires-python = ">=3.11"
dependencies = []

# ────────────────────────────────────────────────────────────────────────────
# Vinaya SDK 可安装包配置
# 使用 pip install -e .[server] 安装（包含 server 依赖）
# 使用 pip install -e . 安装（仅 SDK）
# ───────────────────────────────────────────────────���────────────────────────

[project.optional-dependencies]
server = [
  "fastapi>=0.115,<1.0",
  "uvicorn[standard]>=0.30,<1.0",
  "pydantic>=2.8,<3.0",
  "httpx>=0.27,<1.0"
]

[tool.setuptools.packages.find]
include = ["vinaya*", "packages.engine.vinaya_engine*"]
